name: CI

on:
  push:
  pull_request:

jobs:
  backend-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_sqlite, pdo_mysql, fileinfo
          coverage: none

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Prepare backend env
        run: cp backend/.env.example backend/.env

      - name: Validate backend metadata
        working-directory: backend
        run: composer validate --strict --no-check-publish

      - name: Install backend dependencies
        working-directory: backend
        run: composer install --no-interaction --prefer-dist

      - name: PHP lint
        run: find backend -name '*.php' -not -path 'backend/vendor/*' -exec php -l {} +

      - name: Backend unit tests
        working-directory: backend
        run: composer test

      - name: Backend migrate and seed
        run: |
          php backend/scripts/migrate.php
          php backend/scripts/seed.php

      - name: Backend endpoint/security suite
        run: |
          TRUSTED_PROXIES=127.0.0.1,::1 php -S 127.0.0.1:8010 -t backend/public > /tmp/officegate-api.log 2>&1 &
          sleep 2
          php backend/tests/endpoint_security_test.php http://127.0.0.1:8010

      - name: Frontend install
        working-directory: frontend
        run: npm ci

      - name: Frontend build
        working-directory: frontend
        run: VITE_API_BASE_URL=/api npm run build
